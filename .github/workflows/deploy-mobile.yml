# Deploy automático do app mobile (Expo web) em mobile.letras.cloud.
#
# Dispara em push nas branches de deploy ou manualmente (workflow_dispatch).
# Secrets necessários (Settings > Secrets and variables > Actions):
#   DEPLOY_HOST      IP do VPS
#   DEPLOY_USER      usuário SSH (root)
#   DEPLOY_PASSWORD  senha SSH
name: Deploy mobile web

on:
  push:
    branches:
      - main
      - fix/security-badges-corrections
  workflow_dispatch: {}

concurrency:
  group: deploy-mobile
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --no-frozen-lockfile

      - name: Exportar bundle web do Expo
        working-directory: apps/mobile-app
        run: npx expo export --platform web --output-dir dist-fresh-build
        env:
          EXPO_PUBLIC_API_URL: https://painel.letras.cloud/api/v1

      - name: Instalar paramiko
        run: pip install paramiko

      - name: Deploy no VPS
        run: python tools/deploy/deploy_mobile_web_ci.py
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
