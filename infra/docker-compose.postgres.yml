services:
  letras-postgres:
    image: postgres:16
    container_name: letras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: letras
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - letras_postgres_data:/var/lib/postgresql/data

volumes:
  letras_postgres_data:
